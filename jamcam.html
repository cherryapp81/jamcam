<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamCam</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        .top { background: #FF6B35; color: white; padding: 20px; text-align: center; }
        .top h1 { margin: 0; font-size: 28px; }
        .top p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }
        .cameras { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .cam { background: white; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .cam img { width: 100%; height: 140px; object-fit: cover; display: block; }
        .cam p { padding: 8px; margin: 0; font-size: 12px; font-weight: bold; }
        .loading { text-align: center; padding: 40px; font-size: 16px; color: #666; }
        #status { font-size: 12px; color: #4CAF50; }
    </style>
</head>
<body>

<div class="top">
    <h1>📷 JamCam</h1>
    <p>Beat the jam, check the cam</p>
    <p id="status">Connecting to LTA cameras...</p>
</div>

<div class="cameras" id="cams">
    <div class="loading">Loading cameras...</div>
</div>

<script>
var KEY = '1UdcYjfDR9mYHeJCOPIloA==';
var URL = 'https://datamall2.lta.gov.sg/api/lta/odata/v4/TrafficImages';

fetch(URL, { headers: { 'AccountKey': KEY, 'Accept': 'application/json' } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        var cameras = d.value;
        var html = '';
        
        for (var i = 0; i < cameras.length; i++) {
            var cam = cameras[i];
            var id = String(cam.CameraID);
            var img = cam.ImageLink;
            var loc = cam.Location || 'Camera ' + id;
            
            html += '<div class="cam" onclick="window.open(\'' + img + '\')">';
            html += '<img src="' + img + '" alt="' + loc + '">';
            html += '<p>' + loc + '</p>';
            html += '</div>';
        }
        
        document.getElementById('cams').innerHTML = html;
        document.getElementById('status').textContent = '🟢 Live - ' + cameras.length + ' cameras';
    })
    .catch(function(e) {
        document.getElementById('status').textContent = '🔴 Error: ' + e.message;
        document.getElementById('cams').innerHTML = '<div class="loading">Error loading. <a href="javascript:location.reload()">Try again</a></div>';
    });
</script>

</body>
</html>
