<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamCam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f0f0f0;
        }
        .top {
            background: #FF6B35;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .top h1 {
            margin: 0;
            font-size: 28px;
        }
        .top p {
            margin: 5px 0 0;
            font-size: 14px;
        }
        .cameras {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }
        .cam {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }
        .cam img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }
        .cam p {
            padding: 8px;
            margin: 0;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #666;
        }
        #statusText {
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="top">
    <h1>📷 JamCam</h1>
    <p>Beat the jam, check the cam</p>
    <p id="statusText">Connecting to LTA cameras...</p>
</div>

<div class="cameras" id="cameraGrid">
    <div class="loading">Loading cameras...</div>
</div>

<script>
    var apiKey = '1UdcYjfDR9mYHeJCOPIloA==';
    var apiUrl = 'https://datamall2.lta.gov.sg/api/lta/odata/v4/TrafficImages';

    function fetchData() {
        var statusEl = document.getElementById('statusText');
        var gridEl = document.getElementById('cameraGrid');

        fetch(apiUrl, {
            method: 'GET',
            headers: {
                'AccountKey': apiKey,
                'Accept': 'application/json'
            }
        })
        .then(function(response) {
            if (!response.ok) {
                throw new Error('Server responded with ' + response.status);
            }
            return response.json();
        })
        .then(function(data) {
            var cameras = data.value;
            
            if (!cameras || cameras.length === 0) {
                throw new Error('No cameras found');
            }

            statusEl.textContent = '🟢 Live - ' + cameras.length + ' cameras';
            statusEl.style.color = '#4CAF50';

            var html = '';
            for (var i = 0; i < cameras.length; i++) {
                var cam = cameras[i];
                var id = cam.CameraID;
                var imgUrl = cam.ImageLink;
                var location = cam.Location || 'Camera ' + id;

                html += '<div class="cam" onclick="window.open(\'' + imgUrl + '\', \'_blank\')">';
                html += '<img src="' + imgUrl + '" alt="' + location + '" onerror="this.style.display=\'none\'">';
                html += '<p>📷 ' + location + '</p>';
                html += '</div>';
            }

            gridEl.innerHTML = html;
        })
        .catch(function(error) {
            console.error('JamCam Error:', error);
            statusEl.textContent = '🔴 Error: ' + error.message;
            statusEl.style.color = '#f44336';
            
            gridEl.innerHTML = '<div class="loading">Error loading cameras.<br><br><button onclick="fetchData()" style="padding:10px 20px;background:#FF6B35;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer;">🔄 Try Again</button></div>';
        });
    }

    fetchData();
</script>

</body>
</html>
